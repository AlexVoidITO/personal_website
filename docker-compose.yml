version: '2'
services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:3000"   # использует переменную APP_PORT, по умолчанию 8080
    environment:
      - APP_PORT=${APP_PORT}
      - SERVICE_MODE=${SERVICE_MODE:-false}   # по умолчанию false (режим обслуживания выключен)
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_USER=${LASTFM_USER}
      - LAT=${LAT}
      - LON=${LON}
    restart: always